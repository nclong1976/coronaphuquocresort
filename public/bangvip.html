<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Bảng VIP</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f3f3f3;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:900px;
}

.grid{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap:25px;
}

.vip{
    height:70px;
    border-radius:14px;
    display:flex;
    align-items:center;
    padding-left:25px;
    font-size:28px;
    font-weight:bold;
    color:#ffffff;
    box-shadow:0 6px 12px rgba(0,0,0,0.25);
}

/* VIP0 */
.vip0{
    background:linear-gradient(90deg,#f0f0f0,#6e6e6e);
}

/* VIP1 */
.vip1{
    background:linear-gradient(90deg,#d7e7f7,#4a6a8a);
}

/* VIP2 */
.vip2{
    background:linear-gradient(90deg,#f4d6c3,#9a623e);
}

/* VIP3 */
.vip3{
    background:linear-gradient(90deg,#e5f7a4,#5aa100);
}

/* VIP4 */
.vip4{
    background:linear-gradient(90deg,#cdb8ff,#4c19ff);
}

/* VIP5 */
.vip5{
    background:linear-gradient(90deg,#f4d9c8,#9c5f3e);
}

/* VIP6 */
.vip6{
    background:linear-gradient(90deg,#d9b3ff,#7a1fff);
}

/* VIP7 */
.vip7{
    background:linear-gradient(90deg,#c8ffd5,#0fa93c);
}

/* VIP8 */
.vip8{
    background:linear-gradient(90deg,#ffd6d6,#ff1e1e);
}

/* VIP9 */
.vip9{
    background:linear-gradient(90deg,#d9ffff,#00a7a7);
}

/* VIP10 */
.vip10{
    background:linear-gradient(90deg,#fff2b0,#ffb300);
}

</style>
</head>

<body>

<div class="container">

<div class="grid">

<div class="vip vip0">VIP0</div>
<div class="vip vip1">VIP1</div>
<div class="vip vip2">VIP2</div>

<div class="vip vip3">VIP3</div>
<div class="vip vip4">VIP4</div>
<div class="vip vip5">VIP5</div>

<div class="vip vip6">VIP6</div>
<div class="vip vip7">VIP7</div>
<div class="vip vip8">VIP8</div>

<div class="vip vip9">VIP9</div>
<div class="vip vip10">VIP10</div>

</div>

</div>

</body>
</html>
